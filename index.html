<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contenido</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">

  <div class="container bg-white p-4 rounded shadow">
    <h2 class="mb-4">Generador con IA | Aetheron</h2>

    <div class="mb-3">
      <label class="form-label">NOMBRE DE NEGOCIO:</label>
      <input type="text" id="nombreNegocio" class="form-control" placeholder="Ej. Mi Tienda Express">
    </div>

    <div class="mb-3">
      <label class="form-label">DESCRIPCIÓN:</label>
      <textarea id="descripcionNegocio" class="form-control" rows="3" placeholder="Describe tu negocio..."></textarea>
    </div>

    <button onclick="generarHTML()" class="btn btn-primary">GENERAR</button>
    <button onclick="descargarHTML()" class="btn btn-success">DESCARGAR</button>

    <hr class="my-4">

    <h5>Vista Previa:</h5>
    <div id="frameContenedor" class="border p-3 bg-white" style="min-height: 200px;">
    </div>
  </div>

  <script src="frontend.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
